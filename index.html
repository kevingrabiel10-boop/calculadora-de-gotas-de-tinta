<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Profesional de Tinta CIJ vs TIJ - RCJ</title>
    <style>
        /* Diseño General Centrado */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        /* Tarjeta de la Calculadora */
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%; 
            display: flex;
            flex-direction: column; /* Asegura el orden vertical */
            text-align: center; 
        }

        /* Estilos del Logo */
        .logo-container img { 
            max-width: 250px; 
            height: auto; 
            margin-bottom: 10px;
        }

        h2 { 
            color: #2c3e50; 
            border-bottom: 2px solid #1a73e8; 
            padding-bottom: 10px; 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-size: 1.5rem;
        }

        /* Entradas de Datos */
        .input-group { 
            margin-bottom: 20px; 
            text-align: left; 
            width: 100%;
        }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #444; 
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none;
        }

        input:focus { border-color: #1a73e8; }

        /* Botón */
        button { 
            width: 100%; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 17px; 
            font-weight: bold; 
            transition: background 0.3s;
        }

        button:hover { background: #1557b0; }

        /* Resultados */
        .results-section { 
            margin-top: 25px; 
            display: none; 
            text-align: left; 
        }

        .box { 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }

        .blue-box { background: #e8f0fe; border-left: 5px solid #1a73e8; }
        .green-box { background: #e6fffa; border-left: 5px solid #38a169; }

        .title-box { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            color: #666; 
            margin-bottom: 5px; 
            font-weight: bold; 
        }

        .value { 
            font-size: 1.25rem; 
            font-weight: bold; 
            color: #222; 
        }

        .box small { color: #555; display: block; margin-top: 5px; line-height: 1.3; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo_rcj.png" alt="Logo RCJ">
    </div>

    <h2>Comparativa CIJ vs TIJ</h2>
    
    <div class="input-group">
        <label>Impresiones mensuales:</label>
        <input type="number" id="impMes" placeholder="Ej. 1000000">
    </div>

    <div class="input-group">
        <label>Caracteres por impresión:</label>
        <input type="number" id="charImp" placeholder="Ej. 20">
    </div>

    <button onclick="calcular()">Calcular Ahorro y Duración</button>

    <div id="resultados" class="results-section">
        <div class="box blue-box">
            <div class="title-box">Primera Instalación (Llenado)</div>
            <div class="value" id="resPrimera">--</div>
            <small>Descontando 30M de caracteres que quedan en el sistema.</small>
        </div>

        <div class="box blue-box">
            <div class="title-box">Ciclo Normal (Hasta Alarma)</div>
            <div class="value" id="resNormal">--</div>
            <small>Hasta que salta la alarma a los 20M de caracteres restantes.</small>
        </div>

        <div class="box green-box">
            <div class="title-box">Comparativa Económica</div>
            <div id="resCostos">--</div>
        </div>
    </div>
</div>

<script>
    function calcular() {
        const impAlMes = parseFloat(document.getElementById('impMes').value);
        const charPorImp = parseFloat(document.getElementById('charImp').value);

        if (!impAlMes || !charPorImp || impAlMes <= 0 || charPorImp <= 0) {
            alert("Por favor ingresa valores válidos.");
            return;
        }

        // --- CONSTANTES ---
        const capTotal = 90000000;
        const perdidaSistema = 30000000;
        const reservaAlarma = 20000000;
        const costoCIJ = 135;
        const costoTIJ = 100;
        const impTIJ = 300000;

        const consumoMes = impAlMes * charPorImp;

        // Cálculos de Tiempo
        const mesesPrimera = (capTotal - perdidaSistema) / consumoMes;
        const mesesNormal = (capTotal - reservaAlarma) / consumoMes;

        // Cálculos de Costo
        const impTotalesLitro = (capTotal - reservaAlarma) / charPorImp;
        const equivalenciaTIJ = impTotalesLitro / impTIJ;
        const costoTotalTIJ = equivalenciaTIJ * costoTIJ;
        const ahorro = costoTotalTIJ - costoCIJ;

        // Mostrar Resultados
        document.getElementById('resultados').style.display = 'block';
        document.getElementById('resPrimera').innerText = mesesPrimera.toFixed(2) + " Meses";
        document.getElementById('resNormal').innerText = mesesNormal.toFixed(2) + " Meses";
        
        document.getElementById('resCostos').innerHTML = `
            <p style="margin: 5px 0;">Costo TIJ: <b>$${costoTotalTIJ.toFixed(2)}</b> (${equivalenciaTIJ.toFixed(1)} cartuchos)</p>
            <p style="margin: 5px 0;">Costo CIJ: <b>$${costoCIJ.toFixed(2)}</b> (1 Litro)</p>
            <p style="color: #2f855a; font-weight: bold; margin-top: 10px; font-size: 1.1rem;">
                ¡Ahorras $${ahorro.toFixed(2)} USD por litro!
            </p>
        `;

        document.getElementById('resultados').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
